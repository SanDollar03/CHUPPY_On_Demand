<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="ondemand-page">
    <header class="topbar">
        <div class="topbar-title">CHUPPY RAG CONVERTER</div>
    </header>

    <main class="ondemandGrid">
        <section class="card ondemandSidebarCard">
            <div id="folderTree" class="folderTreeMini"></div>
        </section>

        <section class="card ondemandMainCard">
            <div class="ondemandTopBar">
                <div class="ondemandCurrentWrap">
                    <div class="ondemandCurrentCompact">
                        <div class="ondemandInfoLine">
                            <div class="ondemandInfoLabel">現在のフォルダ</div>
                            <div id="currentPath" class="ondemandInfoValue ondemandCurrentPath">-</div>
                        </div>
                        <div class="ondemandInfoLine">
                            <div class="ondemandInfoLabel">状態</div>
                            <div id="currentMeta" class="ondemandInfoValue ondemandCurrentMeta">Lv5フォルダを選択してください</div>
                        </div>
                        <div class="ondemandInfoLine">
                            <div class="ondemandInfoLabel">Difyナレッジ</div>
                            <div id="knowledgeLabel" class="ondemandKnowledgeLabel">Lv5フォルダを選択してください</div>
                        </div>
                    </div>
                </div>

                <div class="ondemandTopActions">
                    <button id="refreshBtn" type="button">再読込</button>
                </div>
            </div>

            <div id="dropZone" class="ondemandDropZone disabled">
                <div class="ondemandDropText">
                    <div class="ondemandDropTitle">ここにファイルをドラッグ＆ドロップ</div>
                    <div id="dropZoneSub" class="ondemandDropSub">Lv5フォルダ選択時のみ追加できます。1ファイル100MB以下のみ対応です。</div>
                    <div id="dropZoneExts" class="ondemandDropExts">追加可能拡張子: -</div>
                </div>
                <div class="ondemandDropActions">
                    <input id="fileInput" type="file" multiple hidden>
                    <button id="fileSelectBtn" type="button" disabled>ファイル選択</button>
                </div>
            </div>

            <section class="ondemandPanelSection">
                <div class="ondemandPanelTabs">
                    <button id="tabListBtn" class="ondemandTabBtn is-active" type="button">内容一覧</button>
                    <button id="tabQueueBtn" class="ondemandTabBtn" type="button">
                        アップロード待ちキュー
                        <span id="queueTabCount" class="ondemandTabCount">0</span>
                    </button>
                </div>

                <div id="listPanel" class="ondemandPanel">
                    <div class="ondemandListHead">
                        <div class="miniTitle">内容一覧</div>
                        <div id="listState" class="ondemandListState">未選択</div>
                    </div>

                    <div id="listEmpty" class="ondemandEmptyBox">
                        Lv5フォルダを選択すると、対応拡張子の内容一覧が表示されます。
                    </div>

                    <div id="listTableWrap" class="ondemandTableWrap hidden">
                        <table class="ondemandTable">
                            <thead>
                                <tr>
                                    <th><button type="button" class="tableSortBtn" data-sort-key="name" data-sortable="1"><span>名前</span><span class="tableSortMark" aria-hidden="true"></span></button></th>
                                    <th style="width: 98px;"><button type="button" class="tableSortBtn" data-sort-key="status" data-sortable="1"><span>状態</span><span class="tableSortMark" aria-hidden="true"></span></button></th>
                                    <th style="width: 156px;"><button type="button" class="tableSortBtn is-active" data-sort-key="mtime" data-sortable="1"><span>更新日時</span><span class="tableSortMark" aria-hidden="true"></span></button></th>
                                    <th style="width: 96px;"><button type="button" class="tableSortBtn" data-sort-key="size" data-sortable="1"><span>サイズ</span><span class="tableSortMark" aria-hidden="true"></span></button></th>
                                    <th style="width: 86px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="fileTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="queuePanel" class="ondemandPanel hidden">
                    <div class="ondemandListHead">
                        <div class="miniTitle">アップロード待ちキュー</div>
                        <div id="queueSummary" class="ondemandListState">-</div>
                    </div>
                    <div id="queueHint" class="ondemandQueueHint">フォルダ横断でフェアに1件ずつ処理します。</div>

                    <div id="queueEmpty" class="ondemandEmptyBox">
                        現在、キューはありません。
                    </div>

                    <div id="queueTableWrap" class="ondemandTableWrap hidden">
                        <table class="ondemandTable ondemandQueueTable">
                            <thead>
                                <tr>
                                    <th style="width: 84px;">順番</th>
                                    <th style="width: 88px;">状態</th>
                                    <th style="width: 20%;">フォルダ</th>
                                    <th style="width: 18%;">ファイル</th>
                                    <th style="width: 18%;">ナレッジ</th>
                                    <th>進捗</th>
                                    <th style="width: 132px;">更新</th>
                                </tr>
                            </thead>
                            <tbody id="queueTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script id="ondemand-config" type="application/json">
        {{ {
            "rootPath": explorer_root,
            "maxDepth": explorer_max_depth,
            "uploadAllowedDepth": upload_allowed_depth,
            "allowedExtensions": allowed_extensions,
            "maxUploadFileSizeBytes": max_upload_file_size_bytes
        } | tojson }}
    </script>
    <script src="{{ url_for('static', filename='ondemand.js') }}"></script>
</body>
</html>
